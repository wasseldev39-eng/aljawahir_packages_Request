

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary:#2986B0;
      --primary-dark:#1f6f93;
      --accent:#F59E0B;
      --accent-soft:#fff7ed;
      --mint:#7ED6D1;
      --bg:#f6f8fb;
      --text:#1e293b;
      --muted:#64748b;
      --border:#dbeafe;
      --field:#f8fafc;
      --danger:#b91c1c;
      --success:#166534;
      --radius:20px;
    }

    *{
      box-sizing:border-box;
      font-family:Cairo,Tahoma,Arial,sans-serif;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top right,#bae6fd 0,#eef9ff 30%,transparent 54%),
        linear-gradient(135deg,#f8fafc,#ffffff 42%,#eff6ff);
      color:var(--text);
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg,transparent 0 96%,rgba(41,134,176,.08) 96% 100%),
        linear-gradient(0deg,transparent 0 96%,rgba(126,214,209,.10) 96% 100%);
      background-size:34px 34px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 72%);
    }

    .wrap{
      max-width:1040px;
      margin:34px auto;
      padding:18px;
      position:relative;
    }

    .card{
      position:relative;
      overflow:hidden;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(14px);
      border-radius:30px;
      padding:30px;
      box-shadow:0 24px 70px rgba(15,23,42,.10);
      border:1px solid rgba(219,234,254,.95);
    }

    .card:before{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:100%;
      height:7px;
      background:linear-gradient(90deg,var(--accent),var(--mint),var(--primary));
    }

    .head{
      display:flex;
      gap:18px;
      align-items:center;
      margin-bottom:24px;
      padding:16px;
      border:1px solid #e0f2fe;
      border-radius:24px;
      background:linear-gradient(135deg,#ffffff,#f0f9ff);
    }

    .logo{
      width:84px;
      height:84px;
      border-radius:24px;
      object-fit:cover;
      border:4px solid white;
      box-shadow:0 12px 28px rgba(41,134,176,.18);
    }

    .head h1{
      margin:0 0 4px;
      font-size:28px;
      line-height:1.25;
      color:var(--primary-dark);
      font-weight:800;
      letter-spacing:-.4px;
    }

    .status{
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:14px;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:14px 15px;
      border:1px solid #cbd5e1;
      border-radius:16px;
      font-size:15px;
      background:var(--field);
      color:var(--text);
      outline:none;
      transition:.2s ease;
      box-shadow:0 1px 0 rgba(15,23,42,.03);
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:var(--primary);
      background:#fff;
      box-shadow:0 0 0 4px rgba(41,134,176,.12);
    }

    input::placeholder,
    textarea::placeholder{
      color:#94a3b8;
    }

    input[type="file"]{
      padding:12px;
      background:#fff;
      border-style:dashed;
      cursor:pointer;
    }

    input[type="date"]{
      color:#334155;
    }

    textarea{
      min-height:105px;
      resize:vertical;
      line-height:1.8;
    }

    .full{
      grid-column:1/-1;
    }

    .label{
      font-weight:800;
      margin:4px 0 8px;
      color:#334155;
      font-size:14px;
    }

    .submit{
      width:100%;
      padding:16px;
      margin-top:22px;
      border:0;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--mint));
      color:white;
      font-weight:800;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 16px 34px rgba(41,134,176,.24);
      transition:.2s ease;
    }

    .submit:hover{
      transform:translateY(-1px);
      box-shadow:0 20px 42px rgba(41,134,176,.30);
    }

    .submit:active{
      transform:translateY(0);
    }

    .ok,
    .error{
      padding:13px 15px;
      border-radius:16px;
      margin-top:16px;
      font-weight:700;
      border:1px solid transparent;
    }

    .ok{
      background:#dcfce7;
      color:var(--success);
      border-color:#bbf7d0;
    }

    .error{
      background:#fee2e2;
      color:var(--danger);
      border-color:#fecaca;
    }

    .hint{
      display:inline-block;
      font-size:12px;
      color:#92400e;
      background:var(--accent-soft);
      border:1px solid #fed7aa;
      border-radius:999px;
      padding:4px 10px;
      margin-top:8px;
    }

    @media(max-width:640px){
      .wrap{
        margin:12px auto;
        padding:10px;
      }

      .card{
        padding:20px;
        border-radius:24px;
      }

      .head{
        align-items:flex-start;
        padding:14px;
      }

      .logo{
        width:68px;
        height:68px;
        border-radius:20px;
      }

      .head h1{
        font-size:22px;
      }
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <div class="head">

      <img
        id="logo"
        class="logo"
        src="https://scontent.fogx1-1.fna.fbcdn.net/v/t39.30808-6/327352070_2989580661351512_6179979542828320358_n.jpg"
      >

      <div>

        <h1>طلب إعارة عتاد</h1>

        <div class="status">
          جمعية الجواهر بقمار
        </div>

        <div class="hint">
          كل المعلومات إجبارية
        </div>

      </div>

    </div>

    <div class="grid">

      <select id="itemId" required>
        <option value="">اختر العتاد المطلوب</option>
      </select>

      <input id="borrower" placeholder="اسم طالب الطلب" required>

      <input id="contact" placeholder="رقم الهاتف" required>

      <input id="address" placeholder="الجهة / العنوان" required>

      <select id="identityType" required onchange="toggleBackHint()">
        <option value="">نوع الهوية</option>
        <option>بطاقة التعريف الوطنية</option>
        <option>رخصة سياقة</option>
        <option>جواز سفر</option>
        <option>بطاقة طالب</option>
        <option>أخرى</option>
      </select>

      <input id="identityNo" placeholder="رقم الهوية" required>

      <input id="identityIssuer" placeholder="الهوية الصادرة عن" required>

      <div>
        <div class="label">الصادرة بتاريخ</div>
        <input id="identityIssueDate" type="date" required>
      </div>

      <input id="patientName" placeholder="اسم المريض" required>

      <input id="relationship" placeholder="صلة القرابة" required>

      <input id="city" placeholder="المدينة" required>

      <div>
        <div class="label">بداية الإعارة</div>
        <input id="loanDate" type="date" required>
      </div>

      <div>
        <div class="label">تاريخ الترجاع</div>
        <input id="expectedReturnDate" type="date" required>
      </div>

      <div>

        <div class="label">
          صورة الهوية من الأمام
        </div>

        <input id="idFrontImage" type="file" accept="image/*" required>

      </div>

      <div>

        <div class="label" id="backLabel">
          صورة الهوية من الخلف
        </div>

        <input id="idBackImage" type="file" accept="image/*" required>

      </div>

      <textarea
        id="notes"
        class="full"
        placeholder="ملاحظات إضافية">
      </textarea>

    </div>

    <button class="submit" onclick="submitRequest()">
      إرسال الطلب
    </button>

    <div id="msg"></div>

  </div>

</div>

<script>

/* ======================================
   رابط Google Apps Script
====================================== */

const GS_URL =
"https://script.google.com/macros/s/AKfycbzG8grLM0eOfpIwQhoBSHZ-fhOd1EBh9052AxQaIRNDL0jVcVHhOQotBF5HC6odGY07Ag/exec"


function setMsg(text,type){

  msg.innerHTML =
  `<div class="${type}">${text}</div>`
}

function today(){

  return new Date()
  .toISOString()
  .slice(0,10)
}

function toggleBackHint(){

  const pass =
  identityType.value === 'جواز سفر'

  idBackImage.required = !pass

  backLabel.textContent = pass
  ? 'صورة جواز السفر'
  : 'صورة الهوية من الخلف'
}

async function compressImage(inputId){

  const file =
  document.getElementById(inputId).files[0]

  if(!file) return ''

  return new Promise((resolve,reject)=>{

    const img = new Image()

    const reader = new FileReader()

    reader.onload = e => {

      img.onload = ()=>{

        const canvas =
        document.createElement('canvas')

        let w = img.width
        let h = img.height

        const max = 1100

        if(w > h && w > max){

          h = h * max / w
          w = max

        }else if(h > max){

          w = w * max / h
          h = max
        }

        canvas.width = w
        canvas.height = h

        const ctx =
        canvas.getContext('2d')

        ctx.drawImage(img,0,0,w,h)

        resolve(
          canvas.toDataURL(
            'image/jpeg',
            0.72
          )
        )
      }

      img.src = e.target.result
    }

    reader.readAsDataURL(file)
  })
}

function validate(){

  const required = [

    'itemId',
    'borrower',
    'contact',
    'address',
    'identityType',
    'identityNo',
    'identityIssuer',
    'identityIssueDate',
    'patientName',
    'relationship',
    'city',
    'loanDate',
    'expectedReturnDate'
  ]

  for(const id of required){

    if(!document.getElementById(id).value.trim()){

      setMsg(
        'يرجى ملء كل الحقول',
        'error'
      )

      return false
    }
  }

  return true
}

async function submitRequest(){

  if(!validate()) return

  setMsg(
    'جاري إرسال الطلب...',
    'ok'
  )

  try{

    const data = {

      itemId:itemId.value,

      borrower:borrower.value,

      contact:contact.value,

      address:address.value,

      identityType:identityType.value,

      identityNo:identityNo.value,

      identityIssuer:identityIssuer.value,

      identityIssueDate:identityIssueDate.value,

      patientName:patientName.value,

      relationship:relationship.value,

      city:city.value,

      loanDate:loanDate.value,

      expectedReturnDate:expectedReturnDate.value,

      notes:notes.value,

      idFrontImage:
      await compressImage(
        'idFrontImage'
      ),

      idBackImage:
      await compressImage(
        'idBackImage'
      )
    }

    const response =
    await fetch(GS_URL,{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify(data)
    })

    const result =
    await response.json()

    setMsg(
      'تم إرسال الطلب بنجاح',
      'ok'
    )

    console.log(result)

  }catch(err){

    setMsg(
      'حدث خطأ أثناء الإرسال',
      'error'
    )

    console.error(err)
  }
}

window.onload = ()=>{

  loanDate.value = today()
}

</script>

</body>
</html>
